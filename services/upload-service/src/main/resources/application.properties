# Application
quarkus.application.name=upload-service
quarkus.http.port=8080

# PostgreSQL
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=cloudarch
quarkus.datasource.password=${POSTGRES_PASSWORD:cloudarch}
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/cloudarch

# Hibernate
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=false

# Flyway
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true

# Kafka
kafka.bootstrap.servers=localhost:29092
mp.messaging.outgoing.file-uploaded.connector=smallrye-kafka
mp.messaging.outgoing.file-uploaded.topic=file.uploaded
mp.messaging.outgoing.file-uploaded.value.serializer=io.quarkus.kafka.client.serialization.ObjectMapperSerializer

# S3 / MinIO
quarkus.s3.endpoint-override=http://localhost:9000
quarkus.s3.path-style-access=true
quarkus.s3.aws.region=us-east-1
quarkus.s3.aws.credentials.type=static
quarkus.s3.aws.credentials.static-provider.access-key-id=${MINIO_ROOT_USER:minioadmin}
quarkus.s3.aws.credentials.static-provider.secret-access-key=${MINIO_ROOT_PASSWORD:minioadmin}

# S3 bucket
app.upload.bucket=uploads

# Micrometer / Prometheus
quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.export.prometheus.path=/q/metrics

# Health
quarkus.smallrye-health.root-path=/q/health

# OpenTelemetry - disable for local dev, enable when collector is running
quarkus.otel.sdk.disabled=true

# File upload size limits
quarkus.http.limits.max-body-size=100M
